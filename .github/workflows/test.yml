name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create APK Package
        run: |
          mkdir output
          cp -r www output/

      - name: Upload Files
        uses: actions/upload-artifact@v4
        with:
          name: BakraCalculator
          path: output
